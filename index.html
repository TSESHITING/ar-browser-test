<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mind-ar-image-aframe.prod.js"></script>
    
    <style>
      #ui { position: absolute; z-index: 1000; bottom: 20px; left: 50%; transform: translateX(-50%); }
      button { padding: 12px 24px; font-size: 16px; border-radius: 8px; border: none; background: #2196F3; color: white; cursor: pointer; }
    </style>
  </head>
  <body>
    <div id="ui">
      <button id="startBtn">啟動相機 & AR</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-assets>
        <video id="v01" src="video01.mp4" loop="true" crossorigin="anonymous" playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#v01" width="1" height="0.6" position="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const btn = document.querySelector("#startBtn");
      const sceneEl = document.querySelector("a-scene");
      const video = document.querySelector("#v01");

      btn.addEventListener('click', () => {
        // 啟動 AR
        sceneEl.systems['mindar-image-system'].start();
        // 預啟動影片（避開瀏覽器限制）
        video.play().then(() => video.pause());
        // 隱藏按鈕
        document.querySelector("#ui").style.display = "none";
      });
    </script>
  </body>
</html>
