<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mind-ar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #start-screen {
        position: absolute; left: 0; top: 0; right: 0; bottom: 0;
        z-index: 1000; display: flex; flex-direction: column;
        align-items: center; justify-content: center; background: white;
      }
      button { padding: 15px 30px; font-size: 18px; cursor: pointer; }
    </style>
  </head>
  <body>
    <div id="start-screen">
      <button id="startButton">點擊啟動 AR 相機</button>
      <p style="margin-top: 10px; color: #666;">請確保使用 Safari 或 Chrome</p>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: yes; uiScanning: yes;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="v01" src="video01.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#v01" width="1" height="0.56" position="0 0 0"></a-video>
        <a-box position="0 0 -0.1" scale="0.1 0.1 0.1" color="red"></a-box>
      </a-entity>
    </a-scene>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const startButton = document.querySelector("#startButton");
        const sceneEl = document.querySelector("a-scene");
        const video = document.querySelector("#v01");

        startButton.addEventListener('click', () => {
          console.log("Starting AR...");
          // 1. 啟動 AR
          const arSystem = sceneEl.systems['mindar-image-system'];
          arSystem.start(); 
          
          // 2. 解鎖影片
          video.play().then(() => {
            video.pause();
          });

          // 3. 移除啟動螢幕
          document.querySelector("#start-screen").style.display = "none";
        });
      });
    </script>
  </body>
</html>
