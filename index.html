<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>WebAR 單一測試</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <div id="start-btn" style="position: fixed; top: 20px; left: 20px; z-index: 999; padding: 15px; background: white; border-radius: 5px; cursor: pointer;">
      點擊這裡開始（開啟相機與聲音）
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <video id="testVideo" src="test.mp4" preload="auto" loop="true" crossorigin="anonymous" webkit-playsinline playsinline></video>
      </a-assets>

      <a-marker preset="hiro" id="marker">
        <a-video src="#testVideo" width="1.6" height="0.9" rotation="-90 0 0" position="0 0.1 0"></a-video>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const btn = document.getElementById('start-btn');
      const video = document.getElementById('video01.mp4');
      const marker = document.getElementById('marker');

      // 點擊按鈕後隱藏 UI 並初始化影片
      btn.addEventListener('click', () => {
        video.play();
        video.pause(); // 先觸發播放再暫停，解除瀏覽器限制
        btn.style.display = 'none';
      });

      // 掃描到標記時播放，移開時暫停
      marker.addEventListener('markerFound', () => {
        video.play();
      });

      marker.addEventListener('markerLost', () => {
        video.pause();
      });
    </script>
  </body>
</html>
