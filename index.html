<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mind-ar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background-color: #000; }
      #ui {
        position: absolute; z-index: 1000; top: 50%; left: 50%;
        transform: translate(-50%, -50%); text-align: center; color: white;
      }
      button { 
        padding: 20px 40px; font-size: 20px; cursor: pointer; 
        background-color: #4CAF50; color: white; border: none; border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      }
      button:disabled { background-color: #888; cursor: wait; }
      #status { margin-top: 15px; font-size: 14px; color: #aaa; }
    </style>
  </head>
  <body>

    <div id="ui">
      <button id="start-btn" disabled>系統載入中...</button>
      <div id="status">正在檢查 A-Frame 與 Mind-AR 資源...</div>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: yes;" 
      embedded vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="v01" src="video01.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#v01" width="1" height="0.56" position="0 0 0"></a-video>
        <a-box position="0 0 -0.05" scale="0.05 0.05 0.05" color="red"></a-box>
      </a-entity>
    </a-scene>

    <script>
      const startBtn = document.querySelector('#start-btn');
      const statusText = document.querySelector('#status');
      const sceneEl = document.querySelector('a-scene');

      // 1. 確保所有系統載入完成後才啟用按鈕
      sceneEl.addEventListener('loaded', () => {
        startBtn.innerText = "啟動 AR 相機";
        startBtn.disabled = false;
        statusText.innerText = "資源載入完畢，請點擊啟動";
      });

      startBtn.addEventListener('click', () => {
        const arSystem = sceneEl.systems['mindar-image-system'];
        
        statusText.innerText = "正在請求相機權限...";
        
        arSystem.start(); // 啟動相機

        // 解鎖影片播放
        const video = document.querySelector('#v01');
        video.play().then(() => video.pause());

        // 監聽啟動成功
        sceneEl.addEventListener('arReady', () => {
          document.querySelector('#ui').style.display = 'none';
        });

        // 監聽錯誤（如拒絕相機）
        sceneEl.addEventListener('arError', () => {
          statusText.innerText = "錯誤：相機無法啟動。請確認網址為 HTTPS 並允許相機權限。";
          statusText.style.color = "red";
        });
      });

      // 找到目標時取消靜音
      sceneEl.addEventListener('targetFound', () => {
        const video = document.querySelector('#v01');
        video.muted = false;
        video.play();
      });
    </script>
  </body>
</html>
