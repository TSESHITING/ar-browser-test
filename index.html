<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  </head>
  <body>
    <div id="UI" style="position: absolute; z-index: 1000; top: 20px; left: 20px;">
        <button id="startButton" style="padding: 10px 20px;">點擊開始 AR</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-assets>
        <video id="testVideo" src="test.mp4" preload="auto" loop="true" crossorigin="anonymous" webkit-playsinline playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" id="target">
        <a-video src="#testVideo" width="1" height="1" position="0 0 0" rotation="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const startButton = document.querySelector("#startButton");
      const video = document.querySelector("#testVideo");
      const target = document.querySelector("#target");

      startButton.addEventListener('click', () => {
        video.play();
        video.pause(); // 激活音軌
        document.querySelector("#UI").style.display = "none";
      });

      // 偵測到目標時播放
      target.addEventListener("targetFound", event => {
        console.log("Found target!");
        video.play();
      });

      // 目標消失時暫停
      target.addEventListener("targetLost", event => {
        video.pause();
      });
    </script>
  </body>
</html>
